environment: staging
postgres:
  host: postgres
  port: 5432
  database: olist_analytics
  user: olist
  password: olist_password
  pool_size: 10
s3:
  bucket: olist-data-staging
  raw_prefix: raw/
  processed_prefix: processed/
  failed_prefix: failed/
pipeline:
  batch_size: 1000
  retry_max_attempts: 3
  retry_backoff_factor: 2.0
  checkpoint_enabled: true
monitoring:
  metrics_port: 8000
logging:
  level: INFO
  format: json
